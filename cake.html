<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cut the Cake 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #F5C842;
  --gold-dim: #c99e1e;
  --pink: #FF6B9D;
  --cream: #FFF8EE;
  --dark: #1A1008;
}

html, body { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  color: var(--cream);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* ── BACKGROUND GRID ── */
.grid-bg {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(245,200,66,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,200,66,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ── FLOATING ORBS ── */
.orb {
  position: fixed; border-radius: 50%; z-index: 0;
  filter: blur(80px); opacity: 0.18;
  animation: drift 14s ease-in-out infinite alternate;
}
.orb1 { width: 400px; height: 400px; background: var(--gold); top: -100px; left: -100px; animation-duration: 12s; }
.orb2 { width: 300px; height: 300px; background: var(--pink); bottom: -80px; right: -80px; animation-duration: 16s; animation-delay: -6s; }
@keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }

/* ── STAGE ── */
.stage {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1rem; text-align: center; padding: 2rem;
}

.top-tag {
  font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gold); opacity: 0.7;
}

/* ── CAKE ── */
.cake {
  font-size: 180px;
  cursor: pointer;
  display: block;
  animation: floatCake 3.5s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(245,200,66,0.35)) drop-shadow(0 8px 20px rgba(0,0,0,0.4));
  transform-origin: center;
  transition: opacity 0.8s ease-out, transform 0.8s ease-out;
  user-select: none;
  line-height: 1;
}
@keyframes floatCake {
  0%,100% { transform: translateY(0px) rotate(-2deg); }
  50%      { transform: translateY(-28px) rotate(2deg); }
}
.cake:active { transform: scale(0.93); }

/* ── HINT ── */
.hint {
  font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--cream); opacity: 0.35;
  animation: hintPulse 2.5s ease-in-out infinite;
  transition: opacity 0.5s;
}
@keyframes hintPulse {
  0%,100% { opacity: 0.2; }
  50%      { opacity: 0.5; }
}

/* ── FIREWORKS ── */
#fireworks-container { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

@keyframes fw-burst {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
}
@keyframes fw-twinkle {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}
.firework {
  position: fixed;
  width: 10px; height: 10px;
  background: radial-gradient(circle at 30% 30%, #fff7aa, var(--gold), #FF9F43);
  border-radius: 50%;
  pointer-events: none;
  animation: fw-burst 2.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards,
             fw-twinkle 2.4s infinite;
  box-shadow: 0 0 8px rgba(245,200,66,0.8);
}

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed; top: -16px;
  opacity: 0; z-index: 20;
  animation: fall linear forwards;
}
@keyframes fall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
}

/* ── BIRTHDAY MESSAGE ── */
@keyframes bday-pop {
  0%   { transform: translate(-50%,-50%) scale(0) rotateX(90deg); opacity: 0; }
  60%  { transform: translate(-50%,-50%) scale(1.08) rotateX(0deg); }
  100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
}
@keyframes bday-glow {
  0%,100% { text-shadow: 0 0 20px var(--gold), 0 0 40px rgba(245,200,66,0.4); }
  50%      { text-shadow: 0 0 40px var(--gold), 0 0 80px rgba(245,200,66,0.65), 0 0 110px rgba(245,200,66,0.25); }
}

.birthday-message {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  z-index: 100;
  animation: bday-pop 0.9s cubic-bezier(0.68,-0.55,0.265,1.55) forwards;
  background: rgba(26,16,8,0.8);
  padding: 2.5rem 3rem;
  border-radius: 24px;
  border: 1px solid rgba(245,200,66,0.22);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  width: min(480px, 92vw);
}
.birthday-message h2 {
  font-family: 'Abril Fatface', serif;
  font-size: clamp(2rem, 6vw, 3.2rem);
  color: var(--gold);
  margin: 0 0 0.7rem;
  animation: bday-glow 1.8s ease-in-out infinite;
  line-height: 1.1;
}
.birthday-message p {
  font-size: clamp(1rem, 3vw, 1.2rem);
  color: var(--cream);
  opacity: 0.7;
  margin: 0;
  line-height: 1.6;
}

/* ── NEXT BUTTON ── */
@keyframes slide-up {
  0%   { transform: translateY(50px); opacity: 0; }
  100% { transform: translateY(0);    opacity: 1; }
}
.next-button {
  position: fixed;
  bottom: 36px; right: 36px;
  padding: 0.9rem 2.2rem;
  background: var(--gold);
  color: var(--dark);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500; font-size: 1rem;
  letter-spacing: 0.03em;
  border: none; border-radius: 100px; cursor: pointer;
  z-index: 101;
  box-shadow: 0 0 30px rgba(245,200,66,0.3);
  animation: slide-up 0.7s cubic-bezier(0.34,1.56,0.64,1);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.next-button:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow: 0 0 44px rgba(245,200,66,0.55);
}
.next-button:active { transform: scale(0.96); }

/* ── MUSIC BUTTON ── */
.music-btn {
  position: fixed;
  top: 20px; right: 20px;
  padding: 0.6rem 1.3rem;
  background: rgba(245,200,66,0.08);
  color: var(--gold);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 500;
  letter-spacing: 0.04em;
  border: 1px solid rgba(245,200,66,0.28);
  border-radius: 100px; cursor: pointer;
  z-index: 1000;
  transition: all 0.2s ease;
}
.music-btn:hover {
  background: rgba(245,200,66,0.16);
  box-shadow: 0 0 20px rgba(245,200,66,0.25);
}
.music-btn:active { transform: scale(0.97); }

/* ── HIDDEN ── */
.hidden { display: none !important; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .cake { font-size: 120px; }
  .next-button { bottom: 20px; right: 20px; }
  .music-btn { top: 14px; right: 14px; font-size: 0.75rem; padding: 0.5rem 1rem; }
}
@media (max-width: 480px) {
  .cake { font-size: 96px; }
  .birthday-message { padding: 1.8rem 1.5rem; }
  .firework { width: 7px; height: 7px; }
}
@media (max-width: 360px) {
  .cake { font-size: 80px; }
}
@media (hover: none) and (pointer: coarse) {
  .cake:hover { animation: floatCake 3.5s ease-in-out infinite; transform: none; }
  .next-button:hover, .music-btn:hover { transform: none; box-shadow: none; }
  .next-button, .music-btn { min-height: 48px; }
}
/* ───────── GLOBAL RESPONSIVE IMPROVEMENTS ───────── */

/* Better spacing on all screens */
.stage {
  padding: clamp(1rem, 4vw, 2rem);
  gap: clamp(0.8rem, 2vw, 1.2rem);
}

/* Cake scales smoothly */
.cake {
  font-size: clamp(80px, 25vw, 180px);
}

/* Hint text scaling */
.hint {
  font-size: clamp(10px, 2.5vw, 12px);
  text-align: center;
}

/* Top tag scaling */
.top-tag {
  font-size: clamp(10px, 2.5vw, 12px);
}

/* Birthday message responsive width */
.birthday-message {
  width: min(92vw, 480px);
  padding: clamp(1.5rem, 4vw, 2.5rem);
}

/* Text scaling */
.birthday-message h2 {
  font-size: clamp(1.8rem, 6vw, 3.2rem);
}

.birthday-message p {
  font-size: clamp(0.95rem, 3vw, 1.2rem);
}

/* Button positioning fix for small screens */
.next-button {
  right: clamp(12px, 4vw, 36px);
  bottom: clamp(16px, 5vw, 36px);
  padding: clamp(0.7rem, 2.5vw, 0.9rem) clamp(1.6rem, 4vw, 2.2rem);
  font-size: clamp(0.85rem, 2.5vw, 1rem);
}

/* Music button scaling */
.music-btn {
  top: clamp(10px, 3vw, 20px);
  right: clamp(10px, 3vw, 20px);
  font-size: clamp(0.7rem, 2.5vw, 0.82rem);
  padding: clamp(0.45rem, 2vw, 0.6rem) clamp(0.9rem, 3vw, 1.3rem);
}

/* ───────── EXTRA SMALL DEVICES (≤400px) ───────── */
@media (max-width: 400px) {

  .cake {
    font-size: 70px;
  }

  .birthday-message {
    padding: 1.3rem 1rem;
    border-radius: 16px;
  }

  .birthday-message h2 {
    font-size: 1.5rem;
  }

  .birthday-message p {
    font-size: 0.9rem;
  }

  .next-button {
    width: calc(100% - 24px);
    left: 12px;
    right: 12px;
    text-align: center;
  }
}

/* ───────── TOUCH DEVICES FIX ───────── */
@media (hover: none) {

  .cake:active {
    transform: scale(0.92);
  }

  .next-button:hover,
  .music-btn:hover {
    transform: none;
    box-shadow: none;
  }

  .next-button,
  .music-btn {
    min-height: 44px; /* better tap targets */
  }
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div id="fireworks-container"></div>

<div class="stage">
  <p class="top-tag">it's time to celebrate ✦</p>
  <div class="cake" id="cake">🎂</div>
  <p class="hint" id="hint">tap the cake to cut it</p>
</div>

<div id="birthday-message" class="birthday-message hidden">
  <h2>Happy Birthday Buddy! 🎉</h2>
  <p>May Your Day Be As Sweet As This Cake! 💕</p>
</div>

<button id="next-button" class="next-button hidden" onclick="goToNextPage()">Next Page 💌</button>

<audio id="bgMusic" autoplay loop muted>
  <source src="audio.mp3" type="audio/mpeg">
</audio>
<button id="musicToggle" class="music-btn" onclick="toggleAudio()">🔇 Unmute Music</button>

<script>
  /* ── AUDIO (navigate.js compatible) ── */
  function initializeAudioState() {
    var audio  = document.getElementById('bgMusic');
    var button = document.getElementById('musicToggle');
    if (!audio || !button) return;

    var isAudioMuted = localStorage.getItem('audioMuted');
    var savedTime    = parseFloat(localStorage.getItem('audioTime')) || 0;

    try { audio.currentTime = savedTime; } catch(e) {}

    if (isAudioMuted === 'false') {
      audio.muted = false;
      audio.play().catch(function(){});
      button.textContent = '🔊 Mute Music';
    } else {
      audio.muted = true;
      button.textContent = '🔇 Unmute Music';
    }

    setInterval(function() {
      if (!audio.paused && !audio.muted) localStorage.setItem('audioTime', audio.currentTime);
    }, 1000);

    window.addEventListener('beforeunload', function() {
      if (audio) {
        localStorage.setItem('audioTime', audio.currentTime);
        localStorage.setItem('audioMuted', audio.muted);
      }
    });
  }

  function toggleAudio() {
    var audio  = document.getElementById('bgMusic');
    var button = document.getElementById('musicToggle');
    if (audio.muted) {
      audio.muted = false;
      audio.play().catch(function(){});
      button.textContent = '🔊 Mute Music';
      localStorage.setItem('audioMuted', 'false');
    } else {
      audio.muted = true;
      audio.pause();
      button.textContent = '🔇 Unmute Music';
      localStorage.setItem('audioMuted', 'true');
    }
    localStorage.setItem('audioTime', audio.currentTime);
  }

  document.addEventListener('DOMContentLoaded', initializeAudioState);

  /* ── COLORS ── */
  var COLORS = ['#F5C842','#FF6B9D','#FF9F43','#FFF7AA','#ffffff','#FFD700'];

  /* ── FIREWORKS ── */
  function createFireworks() {
    var c = document.getElementById('fireworks-container');
    for (var i = 0; i < 60; i++) {
      var fw = document.createElement('div');
      fw.className = 'firework';
      var tx = (Math.random() - 0.5) * 460;
      var ty = (Math.random() - 0.5) * 460;
      fw.style.cssText =
        'left:'  + (Math.random()*100) + '%;' +
        'top:'   + (Math.random()*100) + '%;' +
        '--tx:'  + tx + 'px;' +
        '--ty:'  + ty + 'px;' +
        'animation-delay:' + (Math.random()*0.6) + 's;';
      c.appendChild(fw);
    }
    setTimeout(function(){ c.innerHTML = ''; }, 3400);
  }

  /* ── CONFETTI ── */
  function launchConfetti() {
    for (var i = 0; i < 90; i++) {
      var el = document.createElement('div');
      el.className = 'confetti-piece';
      var col  = COLORS[Math.floor(Math.random()*COLORS.length)];
      var size = 6 + Math.random()*8;
      el.style.cssText =
        'left:'   + (Math.random()*100) + 'vw;' +
        'width:'  + size + 'px;height:' + size + 'px;' +
        'background:' + col + ';' +
        'border-radius:' + (Math.random()>0.5?'50%':'2px') + ';' +
        'animation-duration:' + (2+Math.random()*3) + 's;' +
        'animation-delay:'    + (Math.random()*1.2) + 's;';
      document.body.appendChild(el);
      el.addEventListener('animationend', function(){ this.remove(); });
    }
  }

  /* ── CAKE CLICK ── */
  var cakeCut = false;
  document.getElementById('cake').addEventListener('click', function() {
    if (cakeCut) return;
    cakeCut = true;

    var cake = this;
    document.getElementById('hint').style.opacity = '0';
    cake.style.transition = 'all 0.3s ease';
    cake.style.transform  = 'rotate(20deg) scale(0.8)';

    createFireworks();
    launchConfetti();

    setTimeout(function(){
      document.getElementById('birthday-message').classList.remove('hidden');
    }, 500);

    setTimeout(function(){
      document.getElementById('next-button').classList.remove('hidden');
    }, 2000);

    setTimeout(function(){
      cake.style.transition = 'all 0.8s ease-out';
      cake.style.opacity    = '0';
      cake.style.transform  = 'rotate(20deg) scale(0.8) translateY(-50px)';
    }, 1500);
  });

  function goToNextPage() {
    var audio = document.getElementById('bgMusic');
    if (audio) { localStorage.setItem('audioTime', audio.currentTime); localStorage.setItem('audioMuted', audio.muted); }
    window.location.href = 'loveletter.html';
  }
</script>
</body>
</html>
