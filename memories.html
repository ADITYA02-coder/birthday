<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories with Sweety</title>

<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #F5C842;
  --pink: #FF6B9D;
  --cream: #FFF8EE;
  --dark: #1A1008;
}

/* BODY */
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  color: var(--cream);
  text-align: center;
  overflow-x: hidden;
}

/* BACKGROUND GRID */
.grid-bg {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(245,200,66,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,200,66,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ORBS */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); opacity: 0.15;
}
.orb1 { width: 400px; height: 400px; background: var(--gold); top: -100px; left: -100px; }
.orb2 { width: 300px; height: 300px; background: var(--pink); bottom: -80px; right: -80px; }

/* TITLE */
.center {
  font-family: 'Abril Fatface', serif;
  font-size: 3rem;
  color: var(--gold);
  margin-top: 20px;
  animation: glow 2.5s infinite;
}
@keyframes glow {
  0%,100% { text-shadow: 0 0 30px rgba(245,200,66,0.4); }
  50% { text-shadow: 0 0 60px rgba(245,200,66,0.8); }
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  top: 20px; right: 20px;
  padding: 0.6rem 1.3rem;
  background: rgba(245,200,66,0.08);
  color: var(--gold);
  border: 1px solid rgba(245,200,66,0.28);
  border-radius: 100px;
  cursor: pointer;
}

/* VIDEO */
.video-section {
  position: relative;
  margin: 40px auto;
  width: 95%;
  max-width: 1000px;
  border-radius: 24px;
  overflow: hidden;

  /* premium frame */
  box-shadow:
    0 0 0 1px rgba(245,200,66,0.3),
    0 20px 60px rgba(0,0,0,0.6),
    0 0 40px rgba(245,200,66,0.15);
}

/* MAIN FIX */
.bgvideo {
  width: 100%;
  height: auto;   /* 🔥 KEY: keeps full video visible */
  object-fit: contain; /* no cropping */

  background: black; /* fills empty space nicely */

  /* clarity boost */
  filter: contrast(1.1) brightness(1.05) saturate(1.1);
}
/* Default video */
.bgvideo {
  width: 100%;
  background: black;
  border-radius: 24px;
  transition: all 0.4s ease;
}

/* Landscape video */
.landscape {
  height: 70vh;
  object-fit: cover;
}

/* Portrait video */
.portrait {
  height: 80vh;
  object-fit: contain;
}

/* PHOTOS */
.photos-section {
  padding: 30px 20px;
}
.photos-section h2 {
  font-family: 'Lora', serif;
  color: var(--gold);
  margin-bottom: 20px;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.gallery img {
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 18px;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(245,200,66,0.2);
}
.gallery img:hover {
  transform: scale(1.08);
  box-shadow: 0 0 40px rgba(245,200,66,0.5);
}

/* HEARTS */
.hearts {
  position: fixed; inset: 0;
  pointer-events: none;
}
.heart {
  position: absolute;
  bottom: -40px;
  animation: rise 10s linear infinite;
}
@keyframes rise {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-110vh); opacity: 0; }
}

/* ───────── GLOBAL IMPROVEMENTS ───────── */

/* Make everything scale nicely */
.wrapper {
  width: 100%;
  padding: 0 12px;
}

/* Images responsive */
img, video {
  max-width: 100%;
  height: auto;
  display: block;
}

/* ───────── TABLETS (768px and below) ───────── */
@media (max-width: 768px) {

  .center {
    font-size: 2.2rem;
  }

  .video-section {
    width: 95%;
    margin: 20px auto;
  }

  /* Video height balanced */
  .landscape {
    height: 50vh;
  }

  .portrait {
    height: 70vh;
  }

  .photos-section h2 {
    font-size: 1.4rem;
  }

  .gallery {
    gap: 15px;
  }

  .gallery img {
    width: 160px;
    height: 160px;
  }

  .music-btn {
    font-size: 0.75rem;
    padding: 6px 12px;
    top: 12px;
    right: 12px;
  }
}

/* ───────── MOBILE (480px and below) ───────── */
@media (max-width: 480px) {

  body {
    padding: 10px;
  }

  .center {
    font-size: 1.8rem;
    line-height: 1.3;
  }

  .video-section {
    width: 100%;
    border-radius: 16px;
  }

  /* Video optimized for small screens */
  .landscape {
    height: 40vh;
  }

  .portrait {
    height: 65vh;
  }

  .photos-section {
    padding: 20px 10px;
  }

  .photos-section h2 {
    font-size: 1.2rem;
  }

  /* Gallery becomes grid */
  .gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .gallery img {
    width: 100%;
    height: 140px;
    border-radius: 12px;
  }

  .music-btn {
    font-size: 0.7rem;
    padding: 5px 10px;
  }
}

/* ───────── LARGE SCREENS (1200px+) ───────── */
@media (min-width: 1200px) {

  .video-section {
    max-width: 1100px;
  }

  .gallery img {
    width: 240px;
    height: 240px;
  }

  .center {
    font-size: 3.2rem;
  }
}
</style>
</head>

<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="hearts" id="hearts"></div>

<h1 class="center">11 Years of Friendship ❤️</h1>

<audio id="bgMusic" autoplay loop muted>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<button id="musicToggle" class="music-btn" onclick="toggleAudio()">🔇 Unmute Music</button>


<div class="photos-section">
  <h2>Photo Memories</h2>
  <div class="gallery">
    <img src="photo1.jpeg">
    <img src="photo2.jpeg">
    <img src="photo3.jpeg">
    <img src="photo4.jpeg">
    <img src="photo5.jpeg">
    <img src="photo6.jpeg">
  </div>
</div>

<div class="video-section">
  <video autoplay loop muted class="bgvideo">
    <source src="video.mp4" type="video/mp4">
  </video>
</div>






<script src="navigate.js"></script>

<script>
/* SAME HEART EFFECT */
const emojis = ['💛','✨','❤️','💕','🌟'];
const container = document.getElementById('hearts');

for(let i=0;i<15;i++){
  const el=document.createElement('div');
  el.className='heart';
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left=Math.random()*100+'%';
  el.style.animationDuration=(6+Math.random()*6)+'s';
  container.appendChild(el);
}



const video = document.querySelector(".bgvideo");

video.addEventListener("loadedmetadata", function () {
    const width = video.videoWidth;
    const height = video.videoHeight;

    if (height > width) {
        // Portrait
        video.classList.add("portrait");
    } else {
        // Landscape
        video.classList.add("landscape");
    }
});
</script>

</body>
</html>
