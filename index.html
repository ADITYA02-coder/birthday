<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown for Harsh 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #F5C842;
    --gold-dim: #c99e1e;
    --pink: #FF6B9D;
    --cream: #FFF8EE;
    --dark: #1A1008;
    --confetti-count: 80;
  }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--cream);
    overflow: hidden;
  }

  /* ── PAGES ── */
  .page {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .page.hidden {
    opacity: 0; pointer-events: none; transform: scale(0.96);
  }

  /* ── BACKGROUND GRID ── */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(245,200,66,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,200,66,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ── FLOATING ORBS ── */
  .orb {
    position: fixed; border-radius: 50%; z-index: 0;
    filter: blur(80px); opacity: 0.18;
    animation: drift 14s ease-in-out infinite alternate;
  }
  .orb1 { width: 400px; height: 400px; background: var(--gold); top: -100px; left: -100px; animation-duration: 12s; }
  .orb2 { width: 300px; height: 300px; background: var(--pink); bottom: -80px; right: -80px; animation-duration: 16s; animation-delay: -6s; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 30px); } }

  /* ── COUNTDOWN PAGE ── */
  #page-countdown { z-index: 10; gap: 2rem; text-align: center; padding: 2rem; }

  .top-tag {
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); opacity: 0.7;
  }

  h1 {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    line-height: 1.05;
    color: var(--cream);
    text-shadow: 0 0 60px rgba(245,200,66,0.25);
  }
  h1 span { color: var(--gold); }

  .timer-row {
    display: flex; gap: 1.5rem; align-items: flex-end; justify-content: center;
    flex-wrap: wrap;
  }
  .timer-unit {
    display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
  }
  .timer-num {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(3rem, 10vw, 7rem);
    line-height: 1;
    color: var(--gold);
    min-width: 2ch; text-align: center;
    transition: transform 0.15s ease;
  }
  .timer-num.pop { transform: scale(1.18); }
  .timer-label {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--cream); opacity: 0.45;
  }
  .colon {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(2.5rem, 8vw, 5.5rem);
    color: var(--gold); opacity: 0.35;
    line-height: 1; margin-bottom: 1.6rem;
  }

  /* Progress arc */
  .arc-wrap { position: relative; width: 220px; height: 220px; }
  .arc-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
  .arc-track { fill: none; stroke: rgba(245,200,66,0.1); stroke-width: 3; }
  .arc-fill { fill: none; stroke: var(--gold); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .arc-inner {
    position: absolute; inset: 20px;
    border-radius: 50%;
    background: rgba(245,200,66,0.04);
    border: 1px solid rgba(245,200,66,0.08);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
  }
  .arc-pct { font-family: 'Abril Fatface', serif; font-size: 2.4rem; color: var(--gold); }
  .arc-sub { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cream); opacity: 0.4; }

  /* Button */
  .btn-surprise {
    margin-top: 0.5rem;
    padding: 0.9rem 2.6rem;
    background: var(--gold);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500; font-size: 1rem;
    letter-spacing: 0.04em;
    border: none; border-radius: 100px; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.4s ease;
    box-shadow: 0 0 30px rgba(245,200,66,0);
  }
  .btn-surprise:not(:disabled):hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 40px rgba(245,200,66,0.5);
  }
  .btn-surprise:not(:disabled):active { transform: scale(0.97); }
  .btn-surprise:disabled { opacity: 0.25; cursor: not-allowed; }

  /* ── SURPRISE PAGE ── */
  #page-surprise { z-index: 10; gap: 1.5rem; text-align: center; padding: 2rem; }

  .surprise-emoji { font-size: 4rem; animation: bounce 1.4s ease infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }

  .surprise-h { font-family: 'Abril Fatface', serif; font-size: clamp(2.4rem, 7vw, 4.5rem); color: var(--gold); line-height: 1.1; }
  .surprise-sub { font-size: 1.1rem; color: var(--cream); opacity: 0.65; max-width: 380px; line-height: 1.6; }

  .gift-card {
    background: rgba(245,200,66,0.07);
    border: 1px solid rgba(245,200,66,0.18);
    border-radius: 20px;
    padding: 1.5rem 2rem;
    max-width: 360px;
    width: 100%;
    font-size: 1rem; line-height: 1.7;
    color: var(--cream); opacity: 0.9;
    text-align: left;
  }
  .gift-card strong { color: var(--gold); font-weight: 500; }

  .ribbon {
    display: inline-block;
    background: var(--pink);
    color: #fff;
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.35rem 1.1rem;
    border-radius: 100px;
    margin-bottom: 0.5rem;
  }

  /* ── PASSWORD GATE ── */
  #page-password { z-index: 30; gap: 1.8rem; text-align: center; padding: 2rem; }

  .pw-heading {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(2.2rem, 7vw, 4.2rem);
    line-height: 1.1;
    color: var(--gold);
    text-shadow: 0 0 50px rgba(245,200,66,0.2);
  }

  .pw-sub {
    font-size: 0.95rem; color: var(--cream); opacity: 0.45;
    letter-spacing: 0.04em;
  }

  .pw-input-wrap {
    position: relative; width: min(340px, 90vw);
  }

  .pw-input {
    width: 100%;
    padding: 0.9rem 3rem 0.9rem 1.2rem;
    background: rgba(255,248,238,0.06);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 100px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .pw-input::placeholder { color: rgba(255,248,238,0.3); }
  .pw-input:focus { border-color: rgba(245,200,66,0.6); }

  .pw-toggle {
    position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: rgba(255,248,238,0.4); font-size: 1.1rem; padding: 0;
    transition: color 0.2s;
  }
  .pw-toggle:hover { color: var(--gold); }

  .pw-btn {
    width: min(340px, 90vw);
    padding: 0.9rem;
    background: var(--gold);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500; font-size: 1rem;
    border: none; border-radius: 100px; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .pw-btn:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(245,200,66,0.45); }
  .pw-btn:active { transform: scale(0.97); }

  .pw-error {
    font-size: 0.85rem; color: var(--pink);
    opacity: 0; transition: opacity 0.3s;
    min-height: 1.2em;
  }
  .pw-error.show { opacity: 1; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-10px); }
    40%      { transform: translateX(10px); }
    60%      { transform: translateX(-7px); }
    80%      { transform: translateX(7px); }
  }
  .shake { animation: shake 0.4s ease; }

  /* ── MUSIC BUTTON ── */
  .music-btn {
    position: fixed;
    top: 20px; right: 20px;
    padding: 0.6rem 1.3rem;
    background: rgba(245,200,66,0.08);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; font-weight: 500;
    letter-spacing: 0.04em;
    border: 1px solid rgba(245,200,66,0.28);
    border-radius: 100px; cursor: pointer;
    z-index: 1000;
    transition: all 0.2s ease;
  }
  .music-btn:hover {
    background: rgba(245,200,66,0.16);
    box-shadow: 0 0 20px rgba(245,200,66,0.25);
  }
  .music-btn:active { transform: scale(0.97); }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed; top: -16px; width: 10px; height: 10px;
    opacity: 0; z-index: 20;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  /* ============================= */
/* GLOBAL RESPONSIVE FIXES */
/* ============================= */

body {
  overflow-x: hidden;
  padding: 0 10px;
}

/* Flexible containers */
.page {
  padding: clamp(1rem, 4vw, 2rem);
}

/* ============================= */
/* TEXT SCALING */
/* ============================= */

h1 {
  font-size: clamp(2rem, 6vw, 5rem);
}

.pw-heading {
  font-size: clamp(1.8rem, 6vw, 4rem);
}

.timer-num {
  font-size: clamp(2rem, 8vw, 6rem);
}

.arc-pct {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
}

/* ============================= */
/* FLEX FIXES */
/* ============================= */

.timer-row {
  flex-wrap: wrap;
  gap: clamp(8px, 3vw, 20px);
  justify-content: center;
}

.timer-unit {
  min-width: 60px;
}

/* ============================= */
/* ARC RESPONSIVE */
/* ============================= */

.arc-wrap {
  width: clamp(140px, 40vw, 220px);
  height: clamp(140px, 40vw, 220px);
  margin: 1rem auto;
}

/* ============================= */
/* INPUT + BUTTON */
/* ============================= */

.pw-input,
.pw-btn,
.btn-surprise {
  width: min(340px, 90vw);
}

/* ============================= */
/* BUTTON POSITION FIX */
/* ============================= */

.music-btn {
  top: 10px;
  right: 10px;
  font-size: 0.75rem;
  padding: 0.5rem 1rem;
}

/* ============================= */
/* MOBILE (≤768px) */
/* ============================= */

@media (max-width: 768px) {

  .timer-row {
    gap: 10px;
  }

  .colon {
    display: none; /* cleaner mobile look */
  }

  .timer-unit {
    flex: 1 1 40%;
  }
}

/* ============================= */
/* SMALL MOBILE (≤480px) */
/* ============================= */

@media (max-width: 480px) {

  body {
    padding: 0 8px;
  }

  h1 {
    font-size: 1.8rem;
  }

  .timer-num {
    font-size: 2rem;
  }

  .arc-wrap {
    width: 130px;
    height: 130px;
  }

  .btn-surprise {
    width: 100%;
  }
}

/* ============================= */
/* EXTRA SMALL DEVICES (≤360px) */
/* ============================= */

@media (max-width: 360px) {

  .timer-unit {
    flex: 1 1 100%;
  }

  .timer-row {
    gap: 6px;
  }

  .arc-wrap {
    width: 110px;
    height: 110px;
  }
}

/* ============================= */
/* TOUCH DEVICES FIX */
/* ============================= */

@media (hover: none) and (pointer: coarse) {

  button:hover {
    transform: none !important;
    box-shadow: none !important;
  }

  button {
    min-height: 44px; /* better tap targets */
  }
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- PASSWORD GATE -->
<div class="page" id="page-password">
  <p class="top-tag">🔒 prove yourself first</p>
  <h1 class="pw-heading">Biggest<br>Achievement</h1>
  <p class="pw-sub">Type your answer below</p>
  <div class="pw-input-wrap">
    <input class="pw-input" id="pwInput" type="password" placeholder="your answer..." autocomplete="off" />
    <button class="pw-toggle" onclick="togglePw()" id="pwToggle">👁</button>
  </div>
  <p class="pw-error" id="pwError">Wrong answer. Try again 👀</p>
  <button class="pw-btn" onclick="checkPassword()">Enter ✦</button>
</div>

<!-- COUNTDOWN PAGE -->
<div class="page hidden" id="page-countdown">
  <p class="top-tag">A special moment is near</p>
  <h1>Happy Birthday<br><span>Harsh</span> 🎂</h1>

  <div class="arc-wrap">
    <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <circle class="arc-track" cx="110" cy="110" r="100"/>
      <circle class="arc-fill" id="arcFill" cx="110" cy="110" r="100"
        stroke-dasharray="628.3" stroke-dashoffset="628.3"/>
    </svg>
    <div class="arc-inner">
      <span class="arc-pct" id="arcPct">0%</span>
      <span class="arc-sub">complete</span>
    </div>
  </div>

  <div class="timer-row">
    <div class="timer-unit"><span class="timer-num" id="tD">00</span><span class="timer-label">days</span></div>
    <span class="colon">:</span>
    <div class="timer-unit"><span class="timer-num" id="tH">00</span><span class="timer-label">hours</span></div>
    <span class="colon">:</span>
    <div class="timer-unit"><span class="timer-num" id="tM">00</span><span class="timer-label">min</span></div>
    <span class="colon">:</span>
    <div class="timer-unit"><span class="timer-num" id="tS">00</span><span class="timer-label">sec</span></div>
  </div>

  <div id="bday-msg" style="font-size:1.4rem;font-family:'Abril Fatface',serif;color:var(--pink);display:none;">Happy Birthday Sweety ❤️</div>

  <button class="btn-surprise" id="enterBtn" disabled onclick="enterSite()">Surprise Ahead ✦</button>
</div>



<script>
  function togglePw() {
    const inp = document.getElementById('pwInput');
    const btn = document.getElementById('pwToggle');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  function checkPassword() {
    const val = document.getElementById('pwInput').value.trim().toLowerCase();
    const wrap = document.querySelector('.pw-input-wrap');
    const err  = document.getElementById('pwError');
    if (val === 'friend of aditya') {
      document.getElementById('page-password').classList.add('hidden');
      document.getElementById('page-countdown').classList.remove('hidden');
    } else {
      err.classList.add('show');
      wrap.classList.remove('shake');
      void wrap.offsetWidth;
      wrap.classList.add('shake');
      document.getElementById('pwInput').value = '';
      setTimeout(() => err.classList.remove('show'), 2500);
    }
  }

  document.getElementById('pwInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  const CIRC = 2 * Math.PI * 100;
  const birthday = new Date("April 11, 2026 00:00:00").getTime();
  const totalDuration = birthday - new Date("January 1, 2026 00:00:00").getTime();

  function pad(n) { return String(Math.max(0,n)).padStart(2,'0'); }

  const COLORS = ['#F5C842','#FF6B9D','#FF9F43','#54A0FF','#5F27CD','#fff'];
  function launchConfetti() {
    for (let i = 0; i < 100; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const size = 6 + Math.random() * 8;
      el.style.cssText = `
        left:${Math.random()*100}vw;
        width:${size}px;height:${size}px;
        background:${color};
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${2+Math.random()*3}s;
        animation-delay:${Math.random()*1.5}s;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  /* ── AUDIO (navigate.js compatible) ── */
  function initializeAudioState() {
    var audio  = document.getElementById('bgMusic');
    var button = document.getElementById('musicToggle');
    if (!audio || !button) return;

    var isAudioMuted = localStorage.getItem('audioMuted');
    var savedTime    = parseFloat(localStorage.getItem('audioTime')) || 0;

    try { audio.currentTime = savedTime; } catch(e) {}

    if (isAudioMuted === 'false') {
      audio.muted = false;
      audio.play().catch(function(){});
      button.textContent = '🔊 Mute Music';
    } else {
      audio.muted = true;
      button.textContent = '🔇 Unmute Music';
    }

    setInterval(function() {
      if (!audio.paused && !audio.muted) localStorage.setItem('audioTime', audio.currentTime);
    }, 1000);

    window.addEventListener('beforeunload', function() {
      if (audio) {
        localStorage.setItem('audioTime', audio.currentTime);
        localStorage.setItem('audioMuted', audio.muted);
      }
    });
  }

  function toggleAudio() {
    var audio  = document.getElementById('bgMusic');
    var button = document.getElementById('musicToggle');
    if (audio.muted) {
      audio.muted = false;
      audio.play().catch(function(){});
      button.textContent = '🔊 Mute Music';
      localStorage.setItem('audioMuted', 'false');
    } else {
      audio.muted = true;
      audio.pause();
      button.textContent = '🔇 Unmute Music';
      localStorage.setItem('audioMuted', 'true');
    }
    localStorage.setItem('audioTime', audio.currentTime);
  }

  document.addEventListener('DOMContentLoaded', initializeAudioState);

  function enterSite() {
    var audio = document.getElementById('bgMusic');
    if (audio) { localStorage.setItem('audioTime', audio.currentTime); localStorage.setItem('audioMuted', audio.muted); }
    window.location.href = "cake.html";
  }

  var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = birthday - now;

    var days    = Math.floor(distance / (1000*60*60*24));
    var hours   = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    var seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById('tD').textContent = pad(days);
    document.getElementById('tH').textContent = pad(hours);
    document.getElementById('tM').textContent = pad(minutes);
    document.getElementById('tS').textContent = pad(seconds);

    // Arc progress
    var progress = Math.min(1, Math.max(0, 1 - distance / totalDuration));
    document.getElementById('arcFill').style.strokeDashoffset = CIRC * (1 - progress);
    document.getElementById('arcPct').textContent = Math.round(progress * 100) + '%';

    if (distance < 0) {
      clearInterval(x);
      document.getElementById('tD').textContent = '00';
      document.getElementById('tH').textContent = '00';
      document.getElementById('tM').textContent = '00';
      document.getElementById('tS').textContent = '00';
      document.getElementById('arcFill').style.strokeDashoffset = 0;
      document.getElementById('arcPct').textContent = '100%';
      document.getElementById('bday-msg').style.display = 'block';
      document.getElementById('enterBtn').disabled = false;
      launchConfetti();
    }
  }, 1000);
</script>
<audio id="bgMusic" autoplay loop muted>
  <source src="audio.mp3" type="audio/mpeg">
</audio>
<button id="musicToggle" class="music-btn" onclick="toggleAudio()">🔇 Unmute Music</button>

</body>
</html>
